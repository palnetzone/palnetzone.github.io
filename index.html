<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAL Netzone</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <style>
        *a:hover {
        text-decoration: underline;
        }

        /* add the counter styles below */
        .counter {
        margin-top: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        }
        .counter a {
        color: #ff00ff;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            color: #00ff00;
            padding: 20px;
            text-align: center;
        }
        img {
            max-width: 400px;
            width: 100%;
            height: auto;
            margin-bottom: 30px;
            image-rendering: pixelated;
            border: 4px solid #00ff00;
            box-shadow: 0 0 20px #00ff0080;
        }
        .content {
            max-width: 600px;
        }
        h1 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px #004400;
        }
        p {
            font-size: 0.7rem;
            line-height: 2;
            margin-bottom: 15px;
            text-shadow: 2px 2px #004400;
        }
        a {
            color: #ff00ff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <img src="images/canvas.png" alt="PAL Netzone">
    <div class="content">
        <h1>Welcome to the PAL Netzone</h1>
        <p>A PS2 online community based on for finding players in that region</p>
        <p>We have a discord please join us at <a href="https://discord.gg/cDC4QURtT8">https://discord.gg/cDC4QURtT8</a></p>
    </div>
</body>
</html>
